name: slang-money-verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify file hash matches freeze
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path
          import re
          import sys

          kernel_path = Path("demo/slang_kernel.py")
          freeze_path = Path("VERIFY/FREEZE_DEMO_SHA256.txt")

          actual_hash = hashlib.sha256(kernel_path.read_bytes()).hexdigest()

          freeze_text = freeze_path.read_text(encoding="utf-8")
          m = re.search(r'([0-9a-f]{64})', freeze_text)
          if not m:
              print("ERROR: Could not find 64-char SHA256 in VERIFY/FREEZE_DEMO_SHA256.txt")
              sys.exit(1)

          expected_hash = m.group(1)

          if actual_hash != expected_hash:
              print("ERROR: File hash mismatch")
              print("Expected:", expected_hash)
              print("Actual:  ", actual_hash)
              sys.exit(1)

          print("File hash verified:", actual_hash)
          PY

      - name: Run kernel and verify deterministic output
        shell: bash
        run: |
          python - <<'PY'
          import ast
          import subprocess
          import sys

          cmd = [sys.executable, "demo/slang_kernel.py"]
          result = subprocess.run(cmd, capture_output=True, text=True, check=True)
          out = result.stdout

          expected_visible_state = {
              "A_initial": "100",
              "B_initial": "100",
              "delta_A": "-50",
              "delta_B": "50",
              "A_final": "50",
              "B_final": "150",
              "state": "resolved",
          }
          expected_maturity = "True"
          expected_certificate = "fbb72e69afc0c7d0657778b230d3b1bd36a00edd050efe07fc7019ce1d11ea1e"

          lines = [line.rstrip() for line in out.splitlines()]

          try:
              vs_idx = lines.index("VISIBLE STATE:")
              sm_idx = lines.index("STRUCTURAL MATURITY:")
              sc_idx = lines.index("STRUCTURAL CERTIFICATE:")
          except ValueError as e:
              print("ERROR: Missing expected section header in output:", e)
              print(out)
              sys.exit(1)

          visible_state_line = next((x for x in lines[vs_idx + 1:] if x.strip()), None)
          maturity_line = next((x for x in lines[sm_idx + 1:] if x.strip()), None)
          certificate_line = next((x for x in lines[sc_idx + 1:] if x.strip()), None)

          if visible_state_line is None or maturity_line is None or certificate_line is None:
              print("ERROR: Missing expected section values")
              print(out)
              sys.exit(1)

          actual_visible_state = ast.literal_eval(visible_state_line)

          if actual_visible_state != expected_visible_state:
              print("ERROR: Visible state mismatch")
              print("Expected:", expected_visible_state)
              print("Actual:  ", actual_visible_state)
              sys.exit(1)

          if maturity_line != expected_maturity:
              print("ERROR: Structural maturity mismatch")
              print("Expected:", expected_maturity)
              print("Actual:  ", maturity_line)
              sys.exit(1)

          if certificate_line != expected_certificate:
              print("ERROR: Structural certificate mismatch")
              print("Expected:", expected_certificate)
              print("Actual:  ", certificate_line)
              sys.exit(1)

          print("Deterministic output verified.")
          print("Visible state:", actual_visible_state)
          print("Structural maturity:", maturity_line)
          print("Structural certificate:", certificate_line)
          PY
